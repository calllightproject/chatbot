<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Postpartum CareConnect</title>
  <style>
    :root {
      --core-blue: #00205b;
      --accent-blue: #007eb4;
      --neutral-gray-text: #303235;
      --light-gray-background: #f5f5f5;
      --white: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      background-color: var(--light-gray-background);
      color: var(--neutral-gray-text);
    }

    .chat-box {
      max-width: 500px;
      margin: 20px auto;
      background: var(--white);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid #e1e1e2;
      margin-bottom: 20px;
    }

    .header h2 {
      color: var(--core-blue);
      margin: 0;
      font-size: 22px;
    }

    .language-link {
      text-decoration: none;
      color: var(--accent-blue);
      font-size: 14px;
      white-space: nowrap;
      margin-left: 10px;
    }

    .bot-reply {
      background-color: #ebf0fa;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      line-height: 1.5;
      text-align: center;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease;
    }

    @keyframes bannerPulse {
      0%   { background-color: #ebf0fa; }
      30%  { background-color: #ffeaa7; }
      60%  { background-color: #fff3c4; }
      100% { background-color: #ebf0fa; }
    }

    .bot-reply.flash {
      animation: bannerPulse 0.8s ease-out 2;
    }

    .options button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 8px 0;
      padding: 15px;
      border: 1px solid var(--core-blue);
      border-radius: 5px;
      background-color: var(--core-blue);
      color: var(--white);
      cursor: pointer;
      font-size: 16px;
      text-align: left;
      transition: background-color 0.3s;
    }

    .options button:hover,
    .options button:focus {
      background-color: #093582;
    }

    .note-section {
      border-top: 1px solid #e1e1e2;
      padding-top: 20px;
      margin-top: 20px;
    }

    .note-label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      color: #4b5563;
    }

    .note-form {
      display: flex;
      gap: 10px;
    }

    .note-form textarea {
      flex-grow: 1;
      border-radius: 5px;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 14px;
    }

    .note-form button {
      flex-shrink: 0;
      padding: 10px 15px;
      border: 1px solid var(--core-blue);
      border-radius: 5px;
      background-color: var(--core-blue);
      color: var(--white);
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s;
    }

    .note-form button:hover {
      background-color: #093582;
    }

    #live-status {
      margin-top: 10px;
      padding: 8px;
      background: #f0f4ff;
      border: 1px solid #c7d2fe;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      opacity: 0.9;
      font-size: 14px;
    }

    /* ✅ NEW: Safety fallback */
    .call-fallback {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      font-size: 12px;
      color: #555;
      text-align: center;
      background-color: #f8f8f8;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #e1e1e2;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div class="chat-box">
    <div class="header">
      <h2>Postpartum CareConnect</h2>
      <a href="{{ url_for('reset_language', room=room_number) }}" class="language-link">Change Language</a>
    </div>

    <div class="bot-reply">
      <p id="greeting-text" data-default="{{ reply }}">{{ reply }}</p>
    </div>

    <div id="live-status"></div>

    <div class="options">
      <form method="POST" action="{{ url_for('handle_chat', room=room_number) }}" style="display: contents;">
        {% for option in options %}
          <button type="submit" name="user_input" value="{{ option }}">{{ option }}</button>
        {% endfor %}
      </form>
    </div>

    <div class="note-section">
      <form method="POST" action="{{ url_for('handle_chat', room=room_number) }}">
        <input type="hidden" name="action" value="send_note">
        <label class="note-label">
          If your request isn’t listed, type a message below.
        </label>
        <div class="note-form">
          <textarea name="custom_note" rows="2" placeholder="Type here..."></textarea>
          <button type="submit">Send</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const ROOM_NUMBER = "{{ room_number }}";
    const greetingEl = document.getElementById('greeting-text');

    function setGreeting(msg) {
      greetingEl.textContent = msg;
    }

    const socket = io('/patient');

    socket.on('connect', () => {
      socket.emit('patient:join', { room_id: ROOM_NUMBER });
    });

    socket.on('request:received', () => {
      setGreeting("We received your request and are coordinating support.");
    });

    socket.on('request:status', (data) => {
      if (data.status === "ack") {
        setGreeting("Your request has been acknowledged.");
      } else if (data.status === "omw") {
        setGreeting("A team member is on the way.");
      }
    });

    socket.on('request:done', () => {
      setGreeting("All set — your request has been completed.");
    });
  </script>

  <!-- ✅ NEW: Safety fallback message -->
  <div class="call-fallback">
    ⚠️ For urgent needs, use the red call light or dial:
    <br>
    <strong>1-6666</strong> (hospital phone) or 
    <strong>602-747-3666</strong> (cell)
  </div>

</body>
</html>
